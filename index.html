<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes carnets de route - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <style>
        /* CODE COULEUR UNIVERSEL KAIDO */
        :root {
            --bg-dark: #0D0B09;
            --bg-card: #14110E;
            --color-gold: #D4AF37;
            --color-torii: #A63A2B;
            --text-main: #F4EFEA;
            --text-muted: #8E847A;
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* HEADER COMPACT AVEC LOGO CENTRÉ ET KAIDO ROUGE TORII */
        .kaido-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .kaido-header .brand-name {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--color-torii);
            text-decoration: none;
            text-shadow: 0 0 10px rgba(166, 58, 43, 0.3);
            transition: all 0.3s ease;
        }

        .kaido-header .brand-name:hover {
            color: var(--color-gold);
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
        }

        .header-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-logo {
            height: 100px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 3px 10px rgba(212, 175, 55, 0.2));
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        .header-right {
            /* Équilibre la grille */
        }

        /* SECTION TITRE */
        .dashboard-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 400;
            margin: 2.5rem 0 2rem 0;
            letter-spacing: 0.02em;
        }

        /* GRILLE DES CARTES */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding-bottom: 5rem;
        }

        /* STRUCTURE STRICTE DE LA CARTE */
        .trip-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .trip-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .trip-banner {
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: #221e1a;
            position: relative;
        }

        /* Dégradé sombre sur l'image pour l'élégance */
        .trip-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }

        .trip-details {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .trip-details h3 {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .trip-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* FOOTER DE CARTE : ALIGNEMENT EN BAS */
        .trip-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }

        .trip-budget {
            color: var(--color-gold);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .trip-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* BOUTON SUPPRIMER STYLE TORII */
        .btn-delete {
            background: rgba(166, 58, 43, 0.1);
            border: 1px solid rgba(166, 58, 43, 0.25);
            color: var(--color-torii);
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background: var(--color-torii);
            color: #ffffff;
            transform: scale(1.1);
        }

        /* LIEN VOIR L'ITINÉRAIRE */
        .btn-view {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .btn-view:hover {
            color: var(--color-gold);
        }

        /* ZONE FIXE CRÉER UN VOYAGE */
        .create-trip-zone {
            border: 2px dashed rgba(212, 175, 55, 0.15);
            background: rgba(20, 17, 14, 0.4);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 2rem;
            text-align: center;
        }

        .create-trip-zone:hover {
            border-color: var(--color-gold);
            background: rgba(20, 17, 14, 0.7);
        }

        .create-trip-zone .plus-icon {
            font-size: 2.5rem;
            color: var(--color-gold);
            margin-bottom: 1rem;
        }

        .create-trip-zone h3 {
            color: var(--text-main);
            font-weight: 500;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- BARRE DE NAVIGATION RENOUVELÉE ET ÉQUILIBRÉE -->
        <header class="kaido-header">
            <div class="header-left">
                <a href="index.html" class="brand-name">KAIDO</a>
            </div>

            <div class="header-center">
                <a href="index.html">
                    <img src="image/logo kaido V4.png" alt="Logo Kaido" class="header-logo">
                </a>
            </div>

            <div class="header-right"></div>
        </header>

        <!-- TITRE PRINCIPAL -->
        <h2 class="dashboard-title">Mes carnets de route</h2>

        <!-- GRILLE DE VOYAGES -->
        <section class="dashboard-grid" id="trips-grid">
            
            <!-- Zone fixe pour ajouter un voyage -->
            <a href="creer.html" class="create-trip-zone">
                <div class="plus-icon">+</div>
                <h3>Tracer une nouvelle route</h3>
            </a>

        </section>
    </div>

    <!-- LOGIQUE JAVASCRIPT ROBUSTE ET RAPIDE -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('trips-grid');
            
            if (grid) {
                const renderTrips = () => {
                    // Nettoyage des cartes existantes
                    const dynamicCards = grid.querySelectorAll('.dynamic-trip');
                    dynamicCards.forEach(card => card.remove());

                    const customTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];
                    const createZone = grid.querySelector('.create-trip-zone');

                    customTrips.forEach(trip => {
                        const card = document.createElement('article');
                        card.className = 'trip-card dynamic-trip';
                        
                        const cityName = trip.destination || trip.title || 'Destination';
                        
                        // Image par défaut élégante si l'ancienne URL ne charge pas
                        let finalImage = trip.image;
                        if (!finalImage || finalImage.includes('unsplash.com')) {
                            finalImage = 'https://images.pexels.com/photos/3278215/pexels-photo-3278215.jpeg?auto=compress&cs=tinysrgb&w=1200';
                        }

                        card.innerHTML = `
                            <div class="trip-banner" style="background-image: url('${finalImage}');"></div>
                            <div class="trip-details">
                                <div>
                                    <h3 style="font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #F4EFEA; margin-bottom: 0.5rem;">${cityName}</h3>
                                    <p class="trip-meta">📅 ${trip.dates || 'Dates non définies'}</p>
                                    ${trip.desc ? `<p style="margin-bottom: 1rem; color: #8E847A; font-size: 0.9rem;">${trip.desc}</p>` : ''}
                                </div>
                                
                                <div class="trip-footer">
                                    <span class="trip-budget">${trip.budget ? trip.budget : '0'} €</span>
                                    <div class="trip-actions">
                                        <button class="btn-delete" data-id="${trip.id}" title="Supprimer ce voyage">🗑️</button>
                                        <a href="voyage.html" class="btn-view" data-id="${trip.id}">VOIR L'ITINÉRAIRE →</a>
                                    </div>
                                </div>
                            </div>
                        `;

                        // Clic pour sélectionner le voyage
                        const viewLink = card.querySelector('.btn-view');
                        if (viewLink) {
                            viewLink.addEventListener('click', () => {
                                localStorage.setItem('currentTrip', JSON.stringify(trip));
                                localStorage.setItem('kaido_active_trip', JSON.stringify(trip));
                            });
                        }
                        
                        if (createZone) {
                            grid.insertBefore(card, createZone);
                        } else {
                            grid.appendChild(card);
                        }
                    });

                    // Écouteurs pour la suppression
                    const deleteButtons = grid.querySelectorAll('.btn-delete');
                    deleteButtons.forEach(button => {
                        button.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            const tripId = parseInt(button.getAttribute('data-id'));
                            if (confirm("Êtes-vous sûr de vouloir supprimer cet itinéraire de Kaido ?")) {
                                deleteTrip(tripId);
                            }
                        });
                    });
                };

                const deleteTrip = (id) => {
                    let customTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];
                    customTrips = customTrips.filter(trip => trip.id !== id);
                    localStorage.setItem('kaido_trips', JSON.stringify(customTrips));
                    
                    const activeTrip = JSON.parse(localStorage.getItem('kaido_active_trip'));
                    if (activeTrip && activeTrip.id === id) {
                        localStorage.removeItem('kaido_active_trip');
                        localStorage.removeItem('currentTrip');
                    }
                    
                    renderTrips();
                };

                renderTrips();
            }
        });
    </script>
</body>
</html>
