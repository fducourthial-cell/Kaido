<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaido | Mes Voyages</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section {
            height: 40vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), 
                              url('image/hero.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 2rem;
        }

        .hero-content {
            text-align: center;
            color: white;
            z-index: 10;
            padding-top: 3rem;
        }

        .hero-content h2 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .trip-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .trip-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.08);
        }

        .trip-banner {
            height: 160px;
            background-size: cover;
            background-position: center;
        }

        .trip-details {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .trip-details h3 {
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
            color: var(--primary-color);
        }

        .trip-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .create-trip-zone {
            grid-column: 1 / -1;
            margin-top: 1rem;
        }

        .btn-create-minimal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: transparent;
            border: 2px dashed var(--border-color);
            padding: 1.5rem;
            border-radius: var(--radius);
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-create-minimal:hover {
            border-color: var(--accent-color);
            color: var(--primary-color);
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="image/kaido logo.png" alt="Kaido Logo" style="height: 40px; width: auto; object-fit: contain;">
        </a>
        
        <nav>
            <a href="index.html">Mes Voyages</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h2>Chaque route raconte une histoire</h2>
            <p>Bonjour Florian. Prêt à planifier votre prochain itinéraire ?</p>
            
            </div>
        </div>
    </section>

    <div id="suggestions-container" class="container" style="display: none; margin-top: 1rem; margin-bottom: 3rem; position: relative; z-index: 30;">
        <h3 id="suggestions-title" style="color: var(--primary-color); margin-bottom: 1.5rem; text-align: center;">🏛️ Les incontournables</h3>
        <div id="monuments-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;"></div>
    </div>

    <main class="container">
        <section class="dashboard-grid">
            
            <div class="create-trip-zone">
                <a href="creer.html" class="btn-create-minimal">
                    <span style="font-size: 1.3rem;">🗺️</span> Tracer une nouvelle route...
                </a>
            </div>

        </section>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDwicdiGq5hkdk5idPdUQi_A01vT5faegU&libraries=places"></script>
    <script src="js/app.js"></script>
</body>
</html>
