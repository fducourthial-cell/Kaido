<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaido | Créer un Voyage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="image/kaido logo.png" alt="Kaido Logo" style="height: 40px; width: auto; object-fit: contain;">
        </a>
        
        <nav>
            <a href="index.html">Mes Voyages</a>
        </nav>
    </header>

    <main class="container">
        <div class="form-box">
            <h2 style="margin-bottom: 1.5rem; color: var(--primary-color);">🗺️ Nouveau Voyage</h2>
            
            <form>
                <div class="form-group">
                    <label for="trip-title">🎯 Destination (Pays ou Ville)</label>
                    <input type="text" id="trip-title" class="form-control" placeholder="Ex: Écosse, Japon, Paris..." required>
                </div>

                <div class="form-group">
                    <label for="trip-origin">🛫 Ville de départ</label>
                    <input type="text" id="trip-origin" class="form-control" placeholder="Ex: Lyon, Paris, Marseille..." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date-start">📅 Date Aller</label>
                        <input type="date" id="date-start" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="date-end">📅 Date Retour</label>
                        <input type="date" id="date-end" class="form-control" required>
                    </div>
                </div>


                <div class="form-group">
                    <label for="trip-desc">📝 Notes de voyage</label>
                    <textarea id="trip-desc" class="form-control" rows="3" placeholder="Description, objectifs, envies..."></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Générer l'itinéraire automatique</button>
            </form>
        </div>
    </main>

   <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly&loading=async" defer></script>
    <script src="js/create-trip.js"></script>
    <script>
        // Optionnel : Ajoute l'autocomplétion Google sur les inputs de création de voyage
        document.addEventListener('DOMContentLoaded', () => {
            const titleInput = document.getElementById('trip-title');
            const originInput = document.getElementById('trip-origin');
            if(titleInput) new google.maps.places.Autocomplete(titleInput, { types: ['(regions)'] });
            if(originInput) new google.maps.places.Autocomplete(originInput, { types: ['(cities)'] });
        });
    </script>
</body>
</html>
