<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracer une nouvelle route - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0D0B09;
            --bg-card: #14110E;
            --color-gold: #D4AF37;
            --color-torii: #A63A2B;
            --text-main: #F4EFEA;
            --text-muted: #8E847A;
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .kaido-header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .kaido-header .brand-name {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .kaido-header nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .kaido-header nav a:hover {
            color: var(--color-gold);
        }

        .create-hero {
            padding: 4rem 0 3rem 0;
            text-align: center;
        }

        .create-hero h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.8rem;
            color: var(--text-main);
        }

        .create-hero p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
            max-width: 500px;
            margin: 0 auto;
        }

        .kaido-form-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 4px;
            margin-bottom: 5rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-gold);
            margin-bottom: 0.6rem;
        }

        .form-control {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid rgba(214, 175, 55, 0.2);
            padding: 0.9rem 1rem;
            color: var(--text-main);
            font-family: var(--font-kaido);
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.04);
            border-color: rgba(214, 175, 55, 0.4);
            border-bottom-color: var(--color-gold);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .kaido-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--color-torii), #82271B);
            color: white;
            border: 1px solid rgba(214, 175, 55, 0.15);
            padding: 1.1rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(166, 58, 43, 0.15);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .kaido-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(166, 58, 43, 0.35);
            border-color: var(--color-gold);
        }

        gmp-place-autocomplete {
            width: 100%;
        }
        
        gmp-place-autocomplete::part(input) {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-bottom: 2px solid rgba(214, 175, 55, 0.2) !important;
            padding: 0.9rem 1rem !important;
            color: var(--text-main) !important;
            font-family: var(--font-kaido) !important;
            font-size: 1rem !important;
            border-radius: 4px !important;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .kaido-form-box { padding: 1.5rem; }
            .create-hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="kaido-header">
            <a href="index.html" class="brand-name">
                <img src="image/logo kaido V4.png" alt="KAIDO" style="height: 45px; width: auto; object-fit: contain;">
            </a>
            <nav>
                <a href="index.html">Mes Voyages</a>
            </nav>
        </header>

        <section class="create-hero">
            <h1>Tracer une nouvelle route</h1>
            <p>Laissez l'intelligence artificielle de Kaido concevoir votre carnet de voyage sur-mesure.</p>
        </section>

        <main class="kaido-form-box">
            <form id="create-trip-form">

                <div class="form-group">
                    <label for="trip-departure">🛫 Ville de départ</label>
                    <input type="text" id="trip-departure" class="form-control" placeholder="Ex: Paris, Édimbourg, Lyon..." required>
                </div>

                <div class="form-group">
                    <label for="trip-destination-modern">📍 Destination de vos rêves</label>
                    <gmp-place-autocomplete id="trip-destination-modern" placeholder="Ex: Écosse, Tokyo, Islande, Toscane..."></gmp-place-autocomplete>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="trip-date-start">📅 Date Aller</label>
                        <input type="date" id="trip-date-start" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="trip-date-end">📅 Date Retour</label>
                        <input type="date" id="trip-date-end" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="trip-budget-input">💶 Budget Max estimé (Optionnel)</label>
                    <input type="number" id="trip-budget-input" class="form-control" placeholder="Ex: 1500" min="0">
                </div>

                <div class="form-group">
                    <label for="trip-notes">📝 Notes, mode de transport & envies de voyage</label>
                    <textarea id="trip-notes" class="form-control" rows="4" placeholder="Ex: Road trip en voiture de location pour visiter les distilleries, randonnée nature dans les Highlands et lieux iconiques..."></textarea>
                </div>

                <button type="submit" class="kaido-submit-btn">
                    ✨ Concevoir mon itinéraire sur-mesure
                </button>

            </form>
        </main>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly&loading=async" defer></script>

    <!-- LOGIQUE DE GÉNÉRATION D'ITINÉRAIRE PAR GEMINI PRO API -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('create-trip-form');
            const modernField = document.getElementById('trip-destination-modern');

            // CLÉ API GEMINI PRO DÉDIÉE À L'APPLICATION KAIDO
            const GEMINI_API_KEY = "AQ.Ab8RN6IE6aVMTCXhuyQdorQw_Y3zsTuARubjoq18noCRdZhuJQ";

            let selectedDestinationName = "";

            if (modernField) {
                modernField.addEventListener('gmp-placeselect', (event) => {
                    const place = event.detail.place;
                    if (place) {
                        selectedDestinationName = place.displayName || place.formattedAddress || place.name || "";
                    }
                });
            }

            // APPEL API GEMINI PRO
            async function generateItineraryWithGemini(apiKey, destination, departure, totalDays, descText) {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

                const prompt = `Tu es un expert mondial en voyage et création d'itinéraires sur-mesure pour l'application Kaido.
Génère un itinéraire ultra-précis, réaliste et cohérent pour un séjour de ${totalDays} jours.

INFORMATIONS :
- Destination : ${destination}
- Ville de départ : ${departure}
- Durée : ${totalDays} jours
- Envies / Notes / Contraintes : "${descText}"

INSTRUCTIONS STRICTES :
1. Propose de vrais noms de lieux, châteaux, parcs, distilleries, quartiers ou monuments réels de la région/ville.
2. Pour chaque jour, inclus 3 étapes (Matin ~09:30, Après-midi ~14:30, Soirée ~19:30) avec des heures réalistes.
3. Attribue une localisation géographique exacte à chaque étape ("location"), par exemple "Glen Coe, Écosse" ou "Eilean Donan Castle, Écosse" pour permettre à Google Maps de la cibler.
4. Crée une check-list de préparation adaptée au voyage (4 à 6 éléments spécifiques comme location de voiture, permis, réservations...).

RETOURNE EXCLUSIVEMENT DU CODE JSON STRICT, AUCUN TEXTE AUTOUR :
{
  "checklist": ["Permis de conduire", "Réservation voiture", "Vêtements de pluie", "Passeport"],
  "itinerary": [
    {
      "day": "Jour 1",
      "steps": [
        { "time": "09:30", "activity": "Intitulé précis de l'activité du matin", "location": "Nom précis du lieu réel, Pays" },
        { "time": "14:30", "activity": "Intitulé précis de l'activité de l'après-midi", "location": "Nom précis du lieu réel, Pays" },
        { "time": "19:30", "activity": "Intitulé de l'activité ou soirée", "location": "Nom du lieu ou ville, Pays" }
      ]
    }
  ]
}`;

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    throw new Error("Erreur de connexion avec l'API Gemini Pro.");
                }

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text;
                return JSON.parse(jsonText);
            }

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalBtnText = submitBtn ? submitBtn.textContent : "Concevoir mon itinéraire sur-mesure";

                    try {
                        let destination = selectedDestinationName;
                        if (!destination && modernField) {
                            const innerInput = modernField.querySelector('input') || modernField.shadowRoot?.querySelector('input') || modernField;
                            if (innerInput && innerInput.value) {
                                destination = innerInput.value.trim();
                            }
                        }

                        if (!destination || destination.trim() === "") {
                            destination = "Écosse";
                        }

                        const departureInput = document.getElementById('trip-departure');
                        const departure = departureInput ? departureInput.value : 'Paris';
                        const dateStart = document.getElementById('trip-date-start').value;
                        const dateEnd = document.getElementById('trip-date-end').value;
                        const budgetInput = document.getElementById('trip-budget-input');
                        const budget = budgetInput ? budgetInput.value : 0;
                        const notesInput = document.getElementById('trip-notes');
                        const desc = notesInput ? notesInput.value : '';

                        if (!dateStart || !dateEnd) {
                            alert("Veuillez renseigner les dates aller et retour.");
                            return;
                        }

                        if (submitBtn) {
                            submitBtn.textContent = "🧠 Gemini Pro conçoit votre itinéraire...";
                            submitBtn.disabled = true;
                        }

                        const start = new Date(dateStart);
                        const end = new Date(dateEnd);

                        if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                            throw new Error("Le format des dates n'est pas valide.");
                        }

                        const timeDiff = end.getTime() - start.getTime();
                        const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;

                        if (totalDays <= 0) {
                            alert("La date de retour doit être après la date de départ !");
                            if (submitBtn) {
                                submitBtn.textContent = originalBtnText;
                                submitBtn.disabled = false;
                            }
                            return;
                        }

                        // 1. GÉNÉRATION VIA GEMINI PRO
                        const aiData = await generateItineraryWithGemini(GEMINI_API_KEY, destination, departure, totalDays, desc);

                        // 2. FORMATAGE DES DATES
                        const formatDate = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
                        
                        const formattedItinerary = aiData.itinerary.map((dayObj, index) => {
                            const currentDate = new Date(start);
                            currentDate.setDate(start.getDate() + index);
                            return {
                                day: dayObj.day || `Jour ${index + 1}`,
                                dateText: formatDate(currentDate),
                                steps: dayObj.steps || []
                            };
                        });

                        // 3. CHECKLIST ADAPTÉE PAR L'IA
                        const formattedChecklist = (aiData.checklist || [
                            "Passeport / Carte d'identité",
                            "Permis de conduire",
                            "Réservations de transports / voiture",
                            "Trousse de pharmacie"
                        ]).map((item, idx) => ({ id: Date.now() + idx, text: item, done: false }));

                        // 4. IMAGE ILLUSTRATIVE DE LA DESTINATION
                        const coverImage = "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?auto=format&fit=crop&w=1200&q=80";

                        const tripData = {
                            id: Date.now(),
                            title: destination,
                            destination: destination,
                            departure: departure,
                            dateStart: dateStart,
                            dateEnd: dateEnd,
                            start: dateStart,
                            end: dateEnd,
                            dates: `${formattedItinerary[0].dateText} au ${formattedItinerary[formattedItinerary.length - 1].dateText}`,
                            budget: budget,
                            desc: desc,
                            image: coverImage, 
                            itinerary: formattedItinerary,
                            checklist: formattedChecklist
                        };

                        localStorage.setItem('currentTrip', JSON.stringify(tripData));
                        localStorage.setItem('kaido_active_trip', JSON.stringify(tripData));

                        const currentTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];
                        currentTrips.push(tripData);
                        localStorage.setItem('kaido_trips', JSON.stringify(currentTrips));

                        console.log("✈️ Voyage généré par Gemini Pro et sauvegardé ! Redirection...");
                        window.location.href = 'voyage.html';

                    } catch (error) {
                        console.error("Erreur critique :", error);
                        alert("Erreur de génération : " + error.message);
                        if (submitBtn) {
                            submitBtn.textContent = originalBtnText;
                            submitBtn.disabled = false;
                        }
                    }
                });
            }
        });
    </script>

</body>
</html>
