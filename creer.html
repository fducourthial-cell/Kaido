<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracer une nouvelle route - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CODE COULEUR UNIVERSEL KAIDO (ESTAMPE) */
        :root {
            --bg-dark: #0D0B09;        /* Noir d'encre profond */
            --bg-card: #14110E;        /* Brun/noir pour le bloc formulaire */
            --color-gold: #D4AF37;      /* Or chaud */
            --color-torii: #A63A2B;     /* Rouge Torii traditionnel */
            --text-main: #F4EFEA;       /* Blanc ivoire doux */
            --text-muted: #8E847A;      /* Gris chaud secondaire */
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        /* 2. RESET TOTAL DE SÉCURITÉ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 3. EN-TÊTE PREMIUM */
        .kaido-header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .kaido-header .brand-name {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: var(--text-main);
            text-decoration: none;
        }

        .kaido-header nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .kaido-header nav a:hover {
            color: var(--color-gold);
        }

        /* 4. HERO SECTION */
        .create-hero {
            padding: 4rem 0 3rem 0;
            text-align: center;
        }

        .create-hero h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.8rem;
            color: var(--text-main);
        }

        .create-hero p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 5. FORMULAIRE JAPONAIS MODERNE */
        .kaido-form-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 4px;
            margin-bottom: 5rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-gold);
            margin-bottom: 0.6rem;
        }

        .form-control {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid rgba(214, 175, 55, 0.2);
            padding: 0.9rem 1rem;
            color: var(--text-main);
            font-family: var(--font-kaido);
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.04);
            border-color: rgba(214, 175, 55, 0.4);
            border-bottom-color: var(--color-gold);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .kaido-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--color-torii), #82271B);
            color: white;
            border: 1px solid rgba(214, 175, 55, 0.15);
            padding: 1.1rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(166, 58, 43, 0.15);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .kaido-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(166, 58, 43, 0.35);
            border-color: var(--color-gold);
        }

        /* SURCHARGE DE STYLE POUR LE COMPOSANT GOOGLE MAPS */
        gmp-place-autocomplete {
            width: 100%;
        }
        
        gmp-place-autocomplete::part(input) {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-bottom: 2px solid rgba(214, 175, 55, 0.2) !important;
            padding: 0.9rem 1rem !important;
            color: var(--text-main) !important;
            font-family: var(--font-kaido) !important;
            font-size: 1rem !important;
            border-radius: 4px !important;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .kaido-form-box { padding: 1.5rem; }
            .create-hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="kaido-header">
            <a href="index.html" class="brand-name">KAIDO</a>
            <nav>
                <a href="index.html">Mes Voyages</a>
            </nav>
        </header>

        <section class="create-hero">
            <h1>Tracer une nouvelle route</h1>
            <p>Renseignez vos dates et laissez l'univers de Kaido concevoir votre carnet de voyage.</p>
        </section>

        <main class="kaido-form-box">
            <form id="create-trip-form">
                
                <div class="form-group">
                    <label for="trip-departure">🛫 Ville de départ</label>
                    <input type="text" id="trip-departure" class="form-control" placeholder="Ex: Paris, Lyon, Marseille..." required>
                </div>

                <div class="form-group">
                    <label for="trip-destination-modern">📍 Destination de vos rêves</label>
                    <gmp-place-autocomplete id="trip-destination-modern" placeholder="Ex: Tokyo, Islande, Barcelone..."></gmp-place-autocomplete>
                    <input type="hidden" id="trip-destination" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="trip-date-start">📅 Date Aller</label>
                        <input type="date" id="trip-date-start" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="trip-date-end">📅 Date Retour</label>
                        <input type="date" id="trip-date-end" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="trip-budget-input">💶 Budget Max estimé (Optionnel)</label>
                    <input type="number" id="trip-budget-input" class="form-control" placeholder="Ex: 1500" min="0">
                </div>

                <div class="form-group">
                    <label for="trip-notes">📝 Notes & envies de voyage (Optionnel)</label>
                    <textarea id="trip-notes" class="form-control" rows="4" placeholder="Ex: Randonnées, visites de temples, spécialités culinaires..."></textarea>
                </div>

                <button type="submit" class="kaido-submit-btn">
                    🚀 Concevoir mon itinéraire
                </button>

            </form>
        </main>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly&loading=async" defer></script>

   <!-- LOGIQUE DE CRÉATION CORRIGÉE, SÉCURISÉE ET INTEGRÉE AVEC LOCALSTORAGE -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('create-trip-form');

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    console.log("Formulaire intercepté, début de la génération...");

                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalBtnText = submitBtn ? submitBtn.textContent : "Concevoir mon itinéraire";

                    try {
                        let destination = "";
                        const modernField = document.getElementById('trip-destination-modern');
                        
                        // 1. Récupération robuste de l'objet Place officiel (Ligne 267 fixée)
                        if (modernField && modernField.value) {
                            const place = modernField.value;
                            destination = place?.displayName || place?.formattedAddress || place?.name || "";
                        }
                        
                        // 2. Si l'objet de sélection Google est vide, on extrait le texte brut saisi à l'écran
                        if (!destination && modernField) {
                            const innerInput = modernField.querySelector('input') || 
                                                (modernField.shadowRoot && modernField.shadowRoot.querySelector('input')) ||
                                                modernField.renderRoot?.querySelector('input');
                            if (innerInput && innerInput.value) {
                                destination = innerInput.value;
                            }
                        }

                        // 3. Repli de secours ultime pour éviter une valeur vide et l'alerte bloquante
                        if (!destination) {
                            const backupInput = document.getElementById('trip-destination');
                            destination = (backupInput && backupInput.value) ? backupInput.value : "Destination Inconnue";
                        }
                        
                        console.log("📍 Destination détectée :", destination);

                        // Récupération des autres données du formulaire
                        const departureInput = document.getElementById('trip-departure');
                        const departure = departureInput ? departureInput.value : 'Paris';
                        const dateStart = document.getElementById('trip-date-start').value;
                        const dateEnd = document.getElementById('trip-date-end').value;
                        const budgetInput = document.getElementById('trip-budget-input');
                        const budget = budgetInput ? budgetInput.value : 0;
                        const notesInput = document.getElementById('trip-notes');
                        const desc = notesInput ? notesInput.value : '';

                        // Sécurités de validation de surface
                        if (destination === "Destination Inconnue") {
                            alert("Veuillez sélectionner ou saisir une destination de voyage valide.");
                            return;
                        }

                        if (!dateStart || !dateEnd) {
                            alert("Veuillez renseigner les dates aller et retour.");
                            return;
                        }

                        if (submitBtn) {
                            submitBtn.textContent = "Calcul de l'itinéraire...";
                            submitBtn.disabled = true;
                        }

                        const start = new Date(dateStart);
                        const end = new Date(dateEnd);

                        if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                            throw new Error("Le format des dates n'est pas valide.");
                        }

                        const timeDiff = end.getTime() - start.getTime();
                        const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;

                        if (totalDays <= 0) {
                            alert("La date de retour doit être après la date de départ !");
                            if (submitBtn) {
                                submitBtn.textContent = originalBtnText;
                                submitBtn.disabled = false;
                            }
                            return;
                        }

                        // Génération automatique de l'itinéraire temporaire Kaido
                        const spots = [
                            "Le centre historique et ses monuments incontournables",
                            "Le grand parc de la ville et ses espaces de détente",
                            "Le musée d'art et d'histoire locale",
                            "Le quartier animé et ses ruelles commerçantes",
                            "Le belvédère principal pour une vue panoramique"
                        ];

                        const itinerary = [];
                        for (let i = 0; i < totalDays; i++) {
                            const currentDate = new Date(start);
                            currentDate.setDate(start.getDate() + i);
                            
                            const dayText = `${String(currentDate.getDate()).padStart(2, '0')}/${String(currentDate.getMonth() + 1).padStart(2, '0')}/${currentDate.getFullYear()}`;
                            
                            itinerary.push({
                                day: `Jour ${i + 1}`,
                                dateText: dayText,
                                steps: [
                                    { time: "10:00", activity: `Exploration : ${spots[i % spots.length]}`, location: destination },
                                    { time: "15:00", activity: "Balade libre et découverte de la culture locale", location: destination }
                                ]
                            });
                        }

                        // --- SAUVEGARDE ET REDIRECTION ÉPURÉE (Ligne 298 fixée) ---
                        const tripData = {
                            id: Date.now(),
                            departure: departure,
                            destination: destination,
                            start: dateStart,
                            end: dateEnd,
                            dates: `${itinerary[0].dateText} au ${itinerary[itinerary.length - 1].dateText}`,
                            budget: budget,
                            desc: desc,
                            image: `https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80`,
                            itinerary: itinerary
                        };

                        // Sauvegarde croisée dans le localStorage pour être lue par toutes tes pages
                        localStorage.setItem('currentTrip', JSON.stringify(tripData));
                        localStorage.setItem('kaido_active_trip', JSON.stringify(tripData));

                        // Ajout à la base de données globale historique
                        const currentTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];
                        currentTrips.push(tripData);
                        localStorage.setItem('kaido_trips', JSON.stringify(currentTrips));

                        console.log("✈️ Voyage sauvegardé avec succès dans le localStorage ! Redirection...");
                        
                        // Redirection finale et fluide vers ta page principale
                        window.location.href = 'index.html';

                    } catch (error) {
                        console.error("Erreur critique stoppée :", error);
                        alert("Une erreur est survenue lors de la création : " + error.message);
                        if (submitBtn) {
                            submitBtn.textContent = originalBtnText;
                            submitBtn.disabled = false;
                        }
                    }
                });
            }
        });
    </script>

</body>
</html>
