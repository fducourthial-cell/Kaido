<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracer une nouvelle route - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CODE COULEUR UNIVERSEL KAIDO (ESTAMPE) */
        :root {
            --bg-dark: #0D0B09;        /* Noir d'encre profond */
            --bg-card: #14110E;        /* Brun/noir pour le bloc formulaire */
            --color-gold: #D4AF37;      /* Or chaud */
            --color-torii: #A63A2B;     /* Rouge Torii traditionnel */
            --text-main: #F4EFEA;       /* Blanc ivoire doux */
            --text-muted: #8E847A;      /* Gris chaud secondaire */
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        /* 2. RESET TOTAL DE SÉCURITÉ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 3. EN-TÊTE PREMIUM */
        .kaido-header {
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .kaido-header .brand-name {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .kaido-header nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .kaido-header nav a:hover {
            color: var(--color-gold);
        }

        /* 4. HERO SECTION */
        .create-hero {
            padding: 4rem 0 3rem 0;
            text-align: center;
        }

        .create-hero h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.8rem;
            color: var(--text-main);
        }

        .create-hero p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 5. FORMULAIRE JAPONAIS MODERNE */
        .kaido-form-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 4px;
            margin-bottom: 5rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-gold);
            margin-bottom: 0.6rem;
        }

        .form-control {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid rgba(214, 175, 55, 0.2);
            padding: 0.9rem 1rem;
            color: var(--text-main);
            font-family: var(--font-kaido);
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.04);
            border-color: rgba(214, 175, 55, 0.4);
            border-bottom-color: var(--color-gold);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .kaido-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--color-torii), #82271B);
            color: white;
            border: 1px solid rgba(214, 175, 55, 0.15);
            padding: 1.1rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(166, 58, 43, 0.15);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .kaido-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(166, 58, 43, 0.35);
            border-color: var(--color-gold);
        }

        /* SURCHARGE DE STYLE POUR LE COMPOSANT GOOGLE MAPS */
        gmp-place-autocomplete {
            width: 100%;
        }
        
        gmp-place-autocomplete::part(input) {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-bottom: 2px solid rgba(214, 175, 55, 0.2) !important;
            padding: 0.9rem 1rem !important;
            color: var(--text-main) !important;
            font-family: var(--font-kaido) !important;
            font-size: 1rem !important;
            border-radius: 4px !important;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .kaido-form-box { padding: 1.5rem; }
            .create-hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="kaido-header">
            <a href="index.html" class="brand-name">
                <img src="image/logo kaido V4.png" alt="KAIDO" style="height: 45px; width: auto; object-fit: contain;">
            </a>
            <nav>
                <a href="index.html">Mes Voyages</a>
            </nav>
        </header>

        <section class="create-hero">
            <h1>Tracer une nouvelle route</h1>
            <p>Renseignez vos dates et laissez l'univers de Kaido concevoir votre carnet de voyage.</p>
        </section>

        <main class="kaido-form-box">
            <form id="create-trip-form">
                
                <div class="form-group">
                    <label for="trip-departure">🛫 Ville de départ</label>
                    <input type="text" id="trip-departure" class="form-control" placeholder="Ex: Paris, Lyon, Marseille..." required>
                </div>

                <div class="form-group">
                    <label for="trip-destination-modern">📍 Destination de vos rêves</label>
                    <gmp-place-autocomplete id="trip-destination-modern" placeholder="Ex: Tokyo, Islande, Barcelone..."></gmp-place-autocomplete>
                    <input type="hidden" id="trip-destination" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="trip-date-start">📅 Date Aller</label>
                        <input type="date" id="trip-date-start" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="trip-date-end">📅 Date Retour</label>
                        <input type="date" id="trip-date-end" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="trip-budget-input">💶 Budget Max estimé (Optionnel)</label>
                    <input type="number" id="trip-budget-input" class="form-control" placeholder="Ex: 1500" min="0">
                </div>

                <div class="form-group">
                    <label for="trip-notes">📝 Notes & envies de voyage (Optionnel)</label>
                    <textarea id="trip-notes" class="form-control" rows="4" placeholder="Ex: Randonnées, visites de temples, spécialités culinaires, fête, shopping..."></textarea>
                </div>

                <button type="submit" class="kaido-submit-btn">
                    🚀 Concevoir mon itinéraire
                </button>

            </form>
        </main>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly&loading=async" defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('create-trip-form');
            const modernField = document.getElementById('trip-destination-modern');
            
            let selectedDestinationName = "";

            if (modernField) {
                modernField.addEventListener('gmp-placeselect', (event) => {
                    const place = event.detail.place;
                    if (place) {
                        selectedDestinationName = place.displayName || place.formattedAddress || place.name || "";
                        console.log("📍 Destination capturée via l'API Google :", selectedDestinationName);
                    }
                });
            }

            // --- MOTEUR D'ITINÉRAIRE INTELLIGENT & CONTEXTUEL ---
            function generateSmartItinerary(destination, descText, totalDays, startDate) {
                const textLower = descText.toLowerCase();

                // Détection des envies dans la note
                const isCulture = textLower.includes('culture') || textLower.includes('temple') || textLower.includes('musée') || textLower.includes('histoire') || textLower.includes('monument');
                const isNature = textLower.includes('nature') || textLower.includes('parc') || textLower.includes('randonnée') || textLower.includes('montagne') || textLower.includes('lac');
                const isFood = textLower.includes('manger') || textLower.includes('gastronomie') || textLower.includes('resto') || textLower.includes('culinaire') || textLower.includes('cuisine') || textLower.includes('marché');
                const isFun = textLower.includes('fête') || textLower.includes('soirée') || textLower.includes('bar') || textLower.includes('shopping') || textLower.includes('fun') || textLower.includes('vie nocturne');
                const isSport = textLower.includes('sport') || textLower.includes('velo') || textLower.includes('kayak') || textLower.includes('surf') || textLower.includes('activit');

                // Banques d'activités thématisées
                const cultureSpots = [
                    "Visite guidée du centre historique et des monuments emblématiques",
                    "Exploration des temples sacrés et bâtiments historiques célèbres",
                    "Découverte du musée principal d'art et d'histoire de la région",
                    "Immersion dans l'architecture ancienne et les quartiers historiques"
                ];

                const natureSpots = [
                    "Randonnée panoramique et points de vue spectaculaires",
                    "Balade relaxante dans le grand parc botanique et jardins de la ville",
                    "Excursion vers les espaces naturels et paysages remarquables des environs",
                    "Promenade au bord de l'eau et reconnexion avec la nature locale"
                ];

                const foodSpots = [
                    "Tour gastronomique et dégustation des spécialités locales au marché central",
                    "Pause culinaire et découverte des meilleurs salons de thé/cafés typiques",
                    "Dîner dans une institution gastronomique réputée de la ville",
                    "Atelier culinaire ou dégustation de produits du terroir"
                ];

                const funSpots = [
                    "Session shopping dans les ruelles commerçantes et boutiques de créateurs",
                    "Exploration des quartiers branchés, street-art et galeries indépendantes",
                    "Soirée animée et cocktail avec vue panoramique sur la skyline",
                    "Découverte de la vie nocturne et des lieux de divertissement populaires"
                ];

                const sportSpots = [
                    "Parcours d'aventure et activité sportive de plein air",
                    "Circuit en vélo à la découverte des plus beaux spots de la ville",
                    "Session d'activité nautique ou randonnée dynamique",
                    "Challenge sportif local et exploration active"
                ];

                const genericSpots = [
                    "Incontournables du centre-ville et premiers pas à pied",
                    "Flânerie dans les ruelles animées et observation de la vie locale",
                    "Achat de souvenirs authentiques et rencontre avec les artisans",
                    "Pause détente et immersion dans l'atmosphère unique de la ville"
                ];

                const itinerary = [];

                for (let i = 0; i < totalDays; i++) {
                    const currentDate = new Date(startDate);
                    currentDate.setDate(startDate.getDate() + i);
                    const dayText = `${String(currentDate.getDate()).padStart(2, '0')}/${String(currentDate.getMonth() + 1).padStart(2, '0')}/${currentDate.getFullYear()}`;

                    let morningAct = genericSpots[i % genericSpots.length];
                    let afternoonAct = genericSpots[(i + 1) % genericSpots.length];

                    if (isCulture && i % 2 === 0) morningAct = cultureSpots[i % cultureSpots.length];
                    if (isNature) afternoonAct = natureSpots[i % natureSpots.length];
                    if (isSport && i % 2 === 1) morningAct = sportSpots[i % sportSpots.length];
                    if (isFun) afternoonAct = funSpots[i % funSpots.length];

                    itinerary.push({
                        day: `Jour ${i + 1}`,
                        dateText: dayText,
                        steps: [
                            { 
                                time: "09:30", 
                                activity: morningAct, 
                                location: `${destination} Centre` 
                            },
                            { 
                                time: "14:30", 
                                activity: afternoonAct, 
                                location: `${destination} Quartier Historique` 
                            },
                            { 
                                time: "19:30", 
                                activity: isFood ? "Dîner gastronomique local sélectionné selon vos envies" : "Soirée libre, détente et flânerie nocturne dans la ville", 
                                location: destination 
                            }
                        ]
                    });
                }

                return itinerary;
            }

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalBtnText = submitBtn ? submitBtn.textContent : "Concevoir mon itinéraire";

                    try {
                        let destination = selectedDestinationName;
                        
                        if (!destination && modernField) {
                            const innerInput = modernField.querySelector('input') || modernField.shadowRoot?.querySelector('input');
                            if (innerInput && innerInput.value) {
                                destination = innerInput.value;
                            }
                        }

                        if (!destination || destination.trim() === "") {
                            destination = "Mon Voyage";
                        }

                        const departureInput = document.getElementById('trip-departure');
                        const departure = departureInput ? departureInput.value : 'Paris';
                        const dateStart = document.getElementById('trip-date-start').value;
                        const dateEnd = document.getElementById('trip-date-end').value;
                        const budgetInput = document.getElementById('trip-budget-input');
                        const budget = budgetInput ? budgetInput.value : 0;
                        const notesInput = document.getElementById('trip-notes');
                        const desc = notesInput ? notesInput.value : '';

                        if (!dateStart || !dateEnd) {
                            alert("Veuillez renseigner les dates aller et retour.");
                            return;
                        }

                        if (submitBtn) {
                            submitBtn.textContent = "Calcul de l'itinéraire sur-mesure...";
                            submitBtn.disabled = true;
                        }

                        const start = new Date(dateStart);
                        const end = new Date(dateEnd);

                        if (isNaN(start.getTime()) || isNaN(end.getTime())) {
                            throw new Error("Le format des dates n'est pas valide.");
                        }

                        const timeDiff = end.getTime() - start.getTime();
                        const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;

                        if (totalDays <= 0) {
                            alert("La date de retour doit être après la date de départ !");
                            if (submitBtn) {
                                submitBtn.textContent = originalBtnText;
                                submitBtn.disabled = false;
                            }
                            return;
                        }

                        // Génération du parcours personnalisé
                        const itinerary = generateSmartItinerary(destination, desc, totalDays, start);

                        // Image dynamique liée à la ville
                        const cityNameClean = encodeURIComponent(destination.split(',')[0].trim());
                        const coverImage = `https://source.unsplash.com/featured/1200x800/?${cityNameClean},travel`;

                        const tripData = {
                            id: Date.now(),
                            title: destination,
                            destination: destination,
                            departure: departure,
                            dateStart: dateStart,
                            dateEnd: dateEnd,
                            start: dateStart,
                            end: dateEnd,
                            dates: `${itinerary[0].dateText} au ${itinerary[itinerary.length - 1].dateText}`,
                            budget: budget,
                            desc: desc,
                            image: coverImage, 
                            itinerary: itinerary
                        };

                        localStorage.setItem('currentTrip', JSON.stringify(tripData));
                        localStorage.setItem('kaido_active_trip', JSON.stringify(tripData));

                        const currentTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];
                        currentTrips.push(tripData);
                        localStorage.setItem('kaido_trips', JSON.stringify(currentTrips));

                        console.log("✈️ Voyage personnalisé sauvegardé ! Redirection...");
                        window.location.href = 'voyage.html';

                    } catch (error) {
                        console.error("Erreur critique :", error);
                        alert("Une erreur est survenue : " + error.message);
                        if (submitBtn) {
                            submitBtn.textContent = originalBtnText;
                            submitBtn.disabled = false;
                        }
                    }
                });
            }
        });
    </script>

</body>
</html>
