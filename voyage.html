<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Itinéraire - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <!-- 1. SDK CLIENT SUPABASE & CONFIGURATION -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0D0B09;
            --bg-card: #14110E;
            --color-gold: #D4AF37;
            --color-torii: #A63A2B;
            --text-main: #F4EFEA;
            --text-muted: #8E847A;
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* CONTENEUR ÉLARGI ÉCRAN LARGES */
        .container {
            width: 92%;
            max-width: 1550px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* BANNIÈRE HERO */
        .hero-section {
            position: relative;
            min-height: 380px;
            background-size: cover;
            background-position: center;
            background-color: #14110E;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem 0 2.5rem 0;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(13, 11, 9, 0.5), rgba(13, 11, 9, 0.95));
            z-index: 1;
        }

        .hero-section > * {
            position: relative;
            z-index: 2;
        }

        .kaido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            height: 150px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 3px 10px rgba(212, 175, 55, 0.2));
        }

        .hero-content {
            margin-top: auto;
        }

        .hero-content h1 {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .trip-dates {
            color: var(--color-gold);
            font-weight: 600;
            font-size: 1rem;
        }

        /* BOUTON RETOUR À GAUCHE SOUS LES DATES */
        .btn-back-left {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.45rem 0.9rem;
            background: rgba(20, 17, 14, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .btn-back-left:hover {
            color: var(--color-gold);
            border-color: var(--color-gold);
            background: rgba(20, 17, 14, 0.9);
            transform: translateX(-3px);
        }

        /* GRILLE PRINCIPALE (CARTE & ITINÉRAIRE) */
        .voyage-main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin: 3rem 0 5rem 0;
        }

        .activity-preview-box {
            width: 100%;
            height: 250px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            margin-top: 1.5rem;
        }

        .activity-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 992px) {
            .container { width: 100%; padding: 0 1rem; }
            .hero-section { min-height: 320px; padding: 1rem 0 1.5rem 0; }
            .header-logo { height: 90px !important; }
            .hero-content h1 { font-size: 2rem; }
            .voyage-main-layout { grid-template-columns: 1fr; gap: 1.8rem; margin: 2rem 0 3rem 0; }
            .activity-preview-box { height: 220px; }
        }
    </style>
</head>
<body>

    <!-- BANNIÈRE HERO AVEC L'ID "trip-banner" REQUIS PAR LE JS -->
    <div class="hero-section" id="trip-banner">
        <div class="container">
            <header class="kaido-header">
                <div class="header-left">
                    <a href="index.html">
                        <img src="image/logo kaido V4.png" alt="Logo Kaido" class="header-logo">
                    </a>
                </div>
                <div class="header-right"></div>
            </header>

            <div class="hero-content">
                <h1 id="trip-title">Chargement du voyage...</h1>
                <p class="trip-dates" id="trip-dates">📅 --/--/---- au --/--/----</p>
                
                <a href="index.html" class="btn-back-left">← Retour à mes Voyages</a>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- RENDER ZONE DE VOYAGE.JS -->
        <main class="voyage-main-layout" id="voyage-content">
            <div id="itinerary-container"></div>
            <div id="map-container">
                <div id="map" style="width:100%; height:450px; border-radius:6px; border:1px solid var(--border-color);"></div>
                <div class="activity-preview-box" id="activity-preview"></div>
            </div>
        </main>
    </div>

    <!-- SCRIPT DE CHARGEMENT DU VOYAGE -->
    <script src="js/voyage.js"></script>
</body>
</html>
