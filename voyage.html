<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Itinéraire - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <!-- SDK CLIENT SUPABASE & CONFIGURATION -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0D0B09;
            --bg-card: #14110E;
            --color-gold: #D4AF37;
            --color-torii: #A63A2B;
            --text-main: #F4EFEA;
            --text-muted: #8E847A;
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            line-height: 1.5;
        }

        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 20;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(13, 11, 9, 0.8) 0%, rgba(13, 11, 9, 0) 100%);
        }

        header nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        header nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        header nav a:hover { color: var(--color-gold); }

        .user-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 17, 14, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.25);
            color: var(--color-gold);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
        }

        .trip-header-visual {
            height: 380px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 3rem 2rem 2.5rem 2rem;
            box-shadow: inset 0 -120px 90px rgba(13, 11, 9, 0.95);
            background-color: #1a1714;
        }

        .trip-header-title { position: relative; z-index: 2; }

        .trip-header-title h2 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            margin-bottom: 0.4rem;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
        }

        .trip-header-title p {
            color: var(--color-gold);
            font-weight: 600;
            font-size: 1.05rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .voyage-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .activity-preview-box {
            width: 100%;
            height: 250px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .checklist-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .btn-flights {
            display: inline-block;
            padding: 0.8rem 1.2rem;
            background: var(--color-torii);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        @media (max-width: 992px) {
            .voyage-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="image/logo kaido V4.png" alt="Kaido Logo" style="height: 50px; width: auto; object-fit: contain;">
        </a>
        <nav>
            <a href="index.html">← Retour à mes Voyages</a>
            <div id="user-display" class="user-btn">
                <span>👤</span>
                <span id="user-name">Florian</span>
            </div>
        </nav>
    </header>

    <section class="trip-header-visual" id="trip-cover">
        <div class="trip-header-title">
            <h2 id="trip-title">Chargement du voyage...</h2>
            <p id="trip-dates">📅 --/--/----</p>
        </div>
    </section>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 1.2rem 1.5rem; border-radius: 6px; border: 1px solid var(--border-color);">
            <div>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Budget estimé :</span>
                <strong id="budget-value" style="color: var(--color-gold); font-size: 1.2rem; margin-left: 8px;">0 €</strong>
            </div>
            <a id="btn-google-flights" href="#" target="_blank" class="btn-flights">✈️ Rechercher les Vols sur Google Flights</a>
        </div>

        <p id="trip-main-desc" style="margin-top: 1.5rem; color: var(--text-muted); font-style: italic;"></p>

        <main class="voyage-grid">
            <!-- SECTION ITINÉRAIRE -->
            <section id="itinerary-days-container"></section>

            <!-- SECTION CARTE, VISIONNEUSE & CHECKLIST -->
            <section>
                <div id="map" style="width: 100%; height: 400px; border-radius: 6px; border: 1px solid var(--border-color);"></div>
                <div class="activity-preview-box" id="activity-preview"></div>

                <div class="checklist-box">
                    <h3 style="font-family: var(--font-serif); color: var(--color-gold); margin-bottom: 1rem;">Checklist & Bagages</h3>
                    <ul id="checklist-list" style="list-style: none;"></ul>
                    <form id="add-task-form" style="display: flex; gap: 10px; margin-top: 1rem;">
                        <input type="text" id="new-task-input" placeholder="Ajouter un élément..." style="flex: 1; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px;">
                        <button type="submit" style="padding: 0.6rem 1rem; background: var(--color-gold); color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">+</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- API Google Maps avec la librairie Places -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places"></script>
    <script src="js/voyage.js"></script>
</body>
</html>
