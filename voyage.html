<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Itinéraire - Kaido</title>
    <link rel="icon" type="image/png" href="image/kaido logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Style pour la zone d'édition masquée */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        .edit-modal-content {
            background: #14110E;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 2rem;
            border-radius: 8px;
            width: 90%; max-width: 500px;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Style spécifique pour le conteneur de la carte Google Maps */
        .map-card {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--bg-card, #14110E);
            border: 1px solid var(--border-color, rgba(212, 175, 55, 0.1));
            border-radius: 8px;
        }

        #map {
            width: 100%;
            height: 280px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="image/kaido logo.png" alt="Kaido Logo" style="height: 50px; width: auto; object-fit: contain;">
        </a>
        <nav>
            <a href="index.html">Mes Voyages</a>
        </nav>
    </header>

    <section class="trip-header-visual" id="trip-cover">
        <div class="trip-header-title">
            <h2 id="trip-main-title">Chargement du voyage...</h2>
            <p id="trip-main-dates">📅 --/--/---- au --/--/----</p>
        </div>
    </section>

    <main class="container">
        <div class="trip-layout" style="display: flex; gap: 2rem; margin-top: 2rem;">
            
            <!-- CONTENU DE L'ITINÉRAIRE (GAUCHE) -->
            <section class="timeline-itinerary" style="flex: 2;">
                <div class="card-box" style="padding: 1.5rem; margin-bottom: 2rem; background-color: #14110E; border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0; color: #F4EFEA;">Description & Notes</h3>
                        <button id="btn-open-edit" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; background-color: #A63A2B; color: white; border: none; border-radius: 4px; cursor: pointer;">⚙️ Modifier le voyage</button>
                    </div>
                    <p id="trip-main-desc" style="color: #8E847A; line-height: 1.6;"></p>
                </div>

                <div id="itinerary-days-container"></div>
            </section>

            <!-- BARRE LATÉRALE LOGISTIQUE & CARTE (DROITE) -->
            <aside class="sidebar-logistique" style="flex: 1; min-width: 300px;">
                <div class="card-box budget-card" style="padding: 1.5rem; background-color: #14110E; border-radius: 8px;">
                    <h3 style="color: #F4EFEA; margin-bottom: 1rem;">Logistique & Budget</h3>
                    <div class="budget-stat">
                        <span class="budget-amount" id="trip-budget" style="color: #D4AF37; font-size: 1.8rem; font-weight: bold;">0 €</span>
                        <span class="budget-label" style="display: block; color: #8E847A; font-size: 0.85rem;">Estimation Total</span>
                    </div>
                    <hr style="border: 0; border-top: 1px solid rgba(212, 175, 55, 0.1); margin: 1.5rem 0;">
                    
                    <a id="btn-google-flights" href="#" target="_blank" class="btn" style="display: block; text-align: center; text-decoration: none; background-color: #1a73e8; color: white; padding: 0.8rem; border-radius: 4px; font-weight: 500;">
                        ✈️ Voir les vols sur Google Flights
                    </a>
                </div>

                <!-- CONTENEUR CARTE GOOGLE MAPS -->
                <div class="map-card">
                    <h3 style="color: #F4EFEA; font-size: 1.1rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 8px;">
                        📍 Carte de la destination
                    </h3>
                    <div id="map"></div>
                </div>
            </aside>
        </div>
    </main>

    <!-- FENÊTRE MODALE DE MODIFICATION -->
    <div id="editModal" class="edit-modal">
        <div class="edit-modal-content">
            <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: #D4AF37;">Modifier les détails du voyage</h3>
            <form id="edit-trip-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:#8E847A;">📅 Date Aller</label>
                    <input type="date" id="edit-date-start" class="form-control" style="width:100%; padding:0.5rem; background:#0D0B09; border:1px solid #333; color:white; border-radius:4px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:#8E847A;">📅 Date Retour</label>
                    <input type="date" id="edit-date-end" class="form-control" style="width:100%; padding:0.5rem; background:#0D0B09; border:1px solid #333; color:white; border-radius:4px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:#8E847A;">💶 Budget (€)</label>
                    <input type="number" id="edit-budget" class="form-control" style="width:100%; padding:0.5rem; background:#0D0B09; border:1px solid #333; color:white; border-radius:4px;">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:#8E847A;">📝 Notes & Description</label>
                    <textarea id="edit-desc" class="form-control" rows="3" style="width:100%; padding:0.5rem; background:#0D0B09; border:1px solid #333; color:white; border-radius:4px;"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="btn-close-edit" class="btn" style="background: #333; color:white; border:none; padding:0.6rem 1rem; border-radius:4px; cursor:pointer;">Annuler</button>
                    <button type="submit" class="btn" style="background: #A63A2B; color:white; border:none; padding:0.6rem 1rem; border-radius:4px; cursor:pointer;">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CHARGEMENT ASYNCHRONE DE L'API GOOGLE MAPS -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly" defer></script>

    <!-- SCRIPT DE GESTION DU VOYAGE & CARTE -->
    <script>
        let map; // Instance globale de la carte

        // Initialisation de la carte Google Maps
        function initMap(destinationName) {
            const mapElement = document.getElementById('map');
            if (!mapElement || typeof google === 'undefined') return;

            const geocoder = new google.maps.Geocoder();

            // Géocodage du nom de la destination pour centrer la carte
            geocoder.geocode({ address: destinationName || "Tokyo, Japon" }, (results, status) => {
                let location = { lat: 35.6762, lng: 139.6503 }; // Tokyo par défaut si statut d'erreur

                if (status === 'OK' && results[0]) {
                    location = results[0].geometry.location;
                }

                map = new google.maps.Map(mapElement, {
                    zoom: 11,
                    center: location,
                    disableDefaultUI: true,
                    zoomControl: true,
                    styles: [
                        { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                        { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                        { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                        {
                            featureType: "administrative.locality",
                            elementType: "labels.text.fill",
                            stylers: [{ color: "#d59563" }],
                        },
                        {
                            featureType: "poi",
                            elementType: "labels.text.fill",
                            stylers: [{ color: "#d59563" }],
                        },
                        {
                            featureType: "road",
                            elementType: "geometry",
                            stylers: [{ color: "#38414e" }],
                        },
                        {
                            featureType: "road",
                            elementType: "geometry.stroke",
                            stylers: [{ color: "#212a37" }],
                        },
                        {
                            featureType: "water",
                            elementType: "geometry",
                            stylers: [{ color: "#17263c" }],
                        },
                    ],
                });

                // Placer le marqueur principal
                new google.maps.Marker({
                    position: location,
                    map: map,
                    title: destinationName,
                    animation: google.maps.Animation.DROP
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            let activeTrip = JSON.parse(localStorage.getItem('kaido_active_trip')) || JSON.parse(localStorage.getItem('currentTrip'));
            const allTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];

            if (!activeTrip) {
                alert("Aucun voyage sélectionné. Retour au tableau de bord.");
                window.location.href = "index.html";
                return;
            }

            // --- RENDU DE LA PAGE ---
            function renderPage() {
                const destination = activeTrip.title || activeTrip.destination || "Destination";

                document.getElementById('trip-main-title').textContent = destination;
                document.getElementById('trip-main-dates').textContent = `📅 ${activeTrip.dates}`;
                document.getElementById('trip-main-desc').textContent = activeTrip.desc || "Aucune note ajoutée pour ce voyage.";
                document.getElementById('trip-budget').textContent = `${activeTrip.budget || 0} €`;

                if (activeTrip.image) {
                    document.getElementById('trip-cover').style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('${activeTrip.image}')`;
                }

                // Lien Google Flights
                const departure = activeTrip.departure ? activeTrip.departure.split(',')[0].trim() : 'Paris';
                const flightBtn = document.getElementById('btn-google-flights');
                if (destination) {
                    flightBtn.href = `https://www.google.com/travel/flights?q=Flights%20to%20${encodeURIComponent(destination)}%20from%20${encodeURIComponent(departure)}`;
                }

                // Rendu des jours
                const daysContainer = document.getElementById('itinerary-days-container');
                daysContainer.innerHTML = ''; 
                
                if (activeTrip.itinerary && activeTrip.itinerary.length > 0) {
                    activeTrip.itinerary.forEach(day => {
                        const dayBlock = document.createElement('div');
                        dayBlock.className = 'day-block card-box';
                        dayBlock.style.cssText = 'background-color: #14110E; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(212, 175, 55, 0.08);';
                        
                        let stepsHTML = '';
                        day.steps.forEach(step => {
                            stepsHTML += `
                                <div class="step-item" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                                    <div class="step-time" style="color: #D4AF37; font-weight: bold; min-width: 60px;">${step.time || '--:--'}</div>
                                    <div class="step-details">
                                        <h4 style="margin: 0; color: #F4EFEA;">${step.activity}</h4>
                                        ${step.location ? `<p style="font-size:0.85rem; color:#8E847A; margin-top: 0.2rem;">📍 ${step.location}</p>` : ''}
                                    </div>
                                </div>
                            `;
                        });

                        dayBlock.innerHTML = `
                            <div class="day-title-box" style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem;">
                                <span class="day-number" style="color: #A63A2B; font-weight: bold; font-size: 1.1rem; margin-right: 0.5rem;">${day.day}</span>
                                <h4 style="display: inline; color: #8E847A;">${day.dateText || ''}</h4>
                            </div>
                            <div class="steps-timeline" style="margin-top: 1rem;">${stepsHTML}</div>
                        `;
                        daysContainer.appendChild(dayBlock);
                    });
                }

                // Chargement de la carte pour la destination
                setTimeout(() => {
                    initMap(destination);
                }, 500);
            }

            renderPage();

            // --- MODALE DE MODIFICATION ---
            const modal = document.getElementById('editModal');
            const btnOpen = document.getElementById('btn-open-edit');
            const btnClose = document.getElementById('btn-close-edit');
            const editForm = document.getElementById('edit-trip-form');

            btnOpen.addEventListener('click', () => {
                document.getElementById('edit-date-start').value = activeTrip.dateStart || '';
                document.getElementById('edit-date-end').value = activeTrip.dateEnd || '';
                document.getElementById('edit-budget').value = activeTrip.budget || 0;
                document.getElementById('edit-desc').value = activeTrip.desc || '';
                modal.style.display = 'flex';
            });

            btnClose.addEventListener('click', () => { modal.style.display = 'none'; });

            editForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const newStart = document.getElementById('edit-date-start').value;
                const newEnd = document.getElementById('edit-date-end').value;
                const newBudget = document.getElementById('edit-budget').value;
                const newDesc = document.getElementById('edit-desc').value;

                const start = new Date(newStart);
                const end = new Date(newEnd);
                const timeDiff = end.getTime() - start.getTime();
                const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;

                if (totalDays <= 0) {
                    alert("La date de retour doit être après la date de départ !");
                    return;
                }

                activeTrip.dateStart = newStart;
                activeTrip.dateEnd = newEnd;
                activeTrip.budget = newBudget;
                activeTrip.desc = newDesc;
                
                const formatDate = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
                activeTrip.dates = `${formatDate(start)} au ${formatDate(end)}`;

                if (activeTrip.itinerary) {
                    activeTrip.itinerary.forEach((day, index) => {
                        const currentDate = new Date(start);
                        currentDate.setDate(start.getDate() + index);
                        day.dateText = formatDate(currentDate);
                    });
                }

                const tripIndex = allTrips.findIndex(t => t.id === activeTrip.id);
                if (tripIndex !== -1) {
                    allTrips[tripIndex] = activeTrip;
                    localStorage.setItem('kaido_trips', JSON.stringify(allTrips));
                }
                localStorage.setItem('kaido_active_trip', JSON.stringify(activeTrip));

                modal.style.display = 'none';
                renderPage();
            });
        });
    </script>
</body>
</html>
