<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Voyage - Kaido</title>
    <link rel="icon" type="image/png" href="image/logo kaido V4.png">
    
    <!-- SDK SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- CSS / Style original -->
    <style>
        :root {
            --bg-dark: #0D0B09;
            --bg-card: #14110E;
            --color-gold: #D4AF37;
            --color-torii: #A63A2B;
            --text-main: #F4EFEA;
            --text-muted: #8E847A;
            --border-color: rgba(212, 175, 55, 0.08);
            --font-kaido: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-kaido);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .hero-banner {
            height: 380px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding-bottom: 2.5rem;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-dark), transparent 80%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .kaido-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 1.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            height: 150px;
            width: auto;
            object-fit: contain;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--color-gold);
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .trip-dates {
            color: var(--color-gold);
            font-size: 1rem;
            font-weight: 500;
        }

        .voyage-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 3rem 0;
        }

        .activity-preview-box {
            width: 100%;
            height: 250px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            margin-top: 1.5rem;
        }

        .activity-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="hero-banner" id="trip-banner">
        <div class="container" style="width: 100%;">
            <header class="kaido-header">
                <a href="index.html">
                    <img src="image/logo kaido V4.png" alt="KAIDO" class="header-logo">
                </a>
                <nav class="header-right">
                    <a href="index.html" class="nav-link">← Retour à mes Voyages</a>
                </nav>
            </header>

            <div class="hero-content">
                <div>
                    <h1 id="trip-title">Chargement du voyage...</h1>
                    <p class="trip-dates" id="trip-dates">📅 --/--/---- au --/--/----</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <main class="voyage-layout">
            <section id="itinerary-container"></section>
            
            <section id="map-container">
                <div id="map" style="width: 100%; height: 450px; border-radius: 6px; border: 1px solid var(--border-color);"></div>
                <div class="activity-preview-box" id="activity-preview"></div>
            </section>
        </main>
    </div>

    <!-- Google Maps API & Voyage Script -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly&loading=async" defer></script>
    <script src="js/voyage.js"></script>
</body>
</html>
