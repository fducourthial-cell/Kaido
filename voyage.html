<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Itinéraire - Kaido</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="image/kaido logo.png" alt="Kaido Logo" style="height: 60px; width: auto; object-fit: contain;">
        </a>
        <nav>
            <a href="index.html">Mes Voyages</a>
        </nav>
    </header>

    <section class="trip-header-visual" id="trip-cover">
        <div class="trip-header-title">
            <h2 id="trip-main-title">Chargement du voyage...</h2>
            <p id="trip-main-dates">📅 --/--/---- au --/--/----</p>
        </div>
    </section>

    <main class="container">
        <div class="trip-layout">
            
            <section class="timeline-itinerary" style="flex: 1;">
                <div class="card-box" style="padding: 1.5rem; margin-bottom: 2rem;">
                    <h3>Description & Notes</h3>
                    <p id="trip-main-desc" style="color: var(--text-muted); line-height: 1.6;"></p>
                </div>

                <div id="itinerary-days-container">
                    </div>
            </section>

            <aside class="sidebar-logistique">
                <div class="card-box budget-card">
                    <h3>Logistique & Budget</h3>
                    <div class="budget-stat">
                        <span class="budget-amount" id="trip-budget">0 €</span>
                        <span class="budget-label">Estimation Total</span>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 1.5rem 0;">
                    
                    <a id="btn-google-flights" href="#" target="_blank" class="btn" style="display: block; text-align: center; text-decoration: none; background-color: #1a73e8; color: white;">
                        ✈️ Voir les vols sur Google Flights
                    </a>
                </div>
            </aside>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1.1 Récupération du voyage actif en mémoire
            const activeTrip = JSON.parse(localStorage.getItem('kaido_active_trip'));

            if (!activeTrip) {
                alert("Aucun voyage sélectionné. Retour au tableau de bord.");
                window.location.href = "index.html";
                return;
            }

            // 1.2 Injection des données textuelles de base
            document.getElementById('trip-main-title').textContent = activeTrip.title;
            document.getElementById('trip-main-dates').textContent = `📅 ${activeTrip.dates}`;
            document.getElementById('trip-main-desc').textContent = activeTrip.desc || "Aucune note ajoutée pour ce voyage.";
            document.getElementById('trip-budget').textContent = `${activeTrip.budget || 0} €`;

            //
