<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Itinéraire - Kaido</title>
    <link rel="icon" type="image/png" href="image/kaido logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0D0B09;
            --bg-card: #14110E;
            --color-gold: #D4AF37;
            --color-torii: #A63A2B;
            --text-main: #F4EFEA;
            --text-muted: #8E847A;
            --border-color: rgba(212, 175, 55, 0.15);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        /* HEADER */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: var(--bg-dark);
        }

        header nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: var(--color-gold);
        }

        /* BANNIÈRE EN-TÊTE */
        .trip-header-visual {
            height: 260px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 2rem;
            box-shadow: inset 0 -100px 80px rgba(13, 11, 9, 0.9);
        }

        .trip-header-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 0.5rem 0;
            color: var(--text-main);
        }

        .trip-header-title p {
            margin: 0;
            color: var(--color-gold);
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem 1.5rem;
        }

        /* MODALE D'ÉDITION */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .edit-modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 8px;
            width: 90%; max-width: 500px;
            color: var(--text-main);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* BARRE LATÉRALE - CHECKLIST */
        .checklist-card {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .checklist-items {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.9rem;
        }

        .checklist-item label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-main);
            flex-grow: 1;
        }

        .checklist-item input[type="checkbox"] {
            accent-color: var(--color-gold);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checklist-item.completed label {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .btn-delete-task {
            background: none;
            border: none;
            color: var(--color-torii);
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-delete-task:hover {
            opacity: 1;
        }

        .checklist-form {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
        }

        .checklist-input {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--text-main);
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .checklist-input:focus {
            outline: none;
            border-color: var(--color-gold);
        }

        .btn-add-task {
            background: var(--color-gold);
            color: var(--bg-dark);
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add-task:hover {
            background: #e6c247;
        }

        /* BARRE LATÉRALE - CARTE MAPS */
        .map-card {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        #map {
            width: 100%;
            height: 220px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="image/kaido logo.png" alt="Kaido Logo" style="height: 45px; width: auto; object-fit: contain;">
        </a>
        <nav>
            <a href="index.html">Mes Voyages</a>
        </nav>
    </header>

    <section class="trip-header-visual" id="trip-cover">
        <div class="trip-header-title">
            <h2 id="trip-main-title">Chargement du voyage...</h2>
            <p id="trip-main-dates">📅 --/--/---- au --/--/----</p>
        </div>
    </section>

    <main class="container">
        <div class="trip-layout" style="display: flex; gap: 2rem; margin-top: 2rem; flex-wrap: wrap;">
            
            <!-- CONTENU DE L'ITINÉRAIRE (GAUCHE) -->
            <section class="timeline-itinerary" style="flex: 2; min-width: 320px;">
                <div class="card-box" style="padding: 1.5rem; margin-bottom: 2rem; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0; color: var(--text-main); font-family: 'Playfair Display', serif;">Description & Notes</h3>
                        <button id="btn-open-edit" class="btn" style="padding: 0.5rem 1rem; font-size: 0.85rem; background-color: var(--color-torii); color: white; border: none; border-radius: 4px; cursor: pointer;">⚙️ Modifier le voyage</button>
                    </div>
                    <p id="trip-main-desc" style="color: var(--text-muted); line-height: 1.6; margin: 0;"></p>
                </div>

                <div id="itinerary-days-container"></div>
            </section>

            <!-- BARRE LATÉRALE LOGISTIQUE, CHECKLIST & CARTE (DROITE) -->
            <aside class="sidebar-logistique" style="flex: 1; min-width: 300px;">
                <!-- LOGISTIQUE & BUDGET -->
                <div class="card-box budget-card" style="padding: 1.5rem; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px;">
                    <h3 style="color: var(--text-main); font-family: 'Playfair Display', serif; margin-top: 0; margin-bottom: 1rem;">Logistique & Budget</h3>
                    <div class="budget-stat">
                        <span class="budget-amount" id="trip-budget" style="color: var(--color-gold); font-size: 1.8rem; font-weight: bold;">0 €</span>
                        <span class="budget-label" style="display: block; color: var(--text-muted); font-size: 0.85rem;">Estimation Total</span>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 1.5rem 0;">
                    
                    <a id="btn-google-flights" href="#" target="_blank" class="btn" style="display: block; text-align: center; text-decoration: none; background-color: #1a73e8; color: white; padding: 0.8rem; border-radius: 4px; font-weight: 500;">
                        ✈️ Voir les vols sur Google Flights
                    </a>
                </div>

                <!-- MODULE CHECK-LIST DE VOYAGE -->
                <div class="checklist-card">
                    <h3 style="color: var(--text-main); font-size: 1.1rem; margin: 0 0 0.3rem 0; display: flex; align-items: center; gap: 8px; font-family: 'Playfair Display', serif;">
                        🎒 Check-list de voyage
                    </h3>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin: 0;">Ne rien oublier avant le départ</p>

                    <ul class="checklist-items" id="checklist-container"></ul>

                    <form class="checklist-form" id="add-task-form">
                        <input type="text" id="new-task-input" class="checklist-input" placeholder="Ajouter un élément..." required>
                        <button type="submit" class="btn-add-task">+</button>
                    </form>
                </div>

                <!-- CARTE GOOGLE MAPS -->
                <div class="map-card">
                    <h3 style="color: var(--text-main); font-size: 1.1rem; margin: 0 0 0.8rem 0; display: flex; align-items: center; gap: 8px; font-family: 'Playfair Display', serif;">
                        📍 Carte de la destination
                    </h3>
                    <div id="map"></div>
                </div>
            </aside>
        </div>
    </main>

    <!-- FENÊTRE MODALE DE MODIFICATION -->
    <div id="editModal" class="edit-modal">
        <div class="edit-modal-content">
            <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--color-gold); font-family: 'Playfair Display', serif;">Modifier les détails du voyage</h3>
            <form id="edit-trip-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">📅 Date Aller</label>
                    <input type="date" id="edit-date-start" class="form-control" style="width:100%; padding:0.5rem; background:var(--bg-dark); border:1px solid #333; color:white; border-radius:4px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">📅 Date Retour</label>
                    <input type="date" id="edit-date-end" class="form-control" style="width:100%; padding:0.5rem; background:var(--bg-dark); border:1px solid #333; color:white; border-radius:4px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">💶 Budget (€)</label>
                    <input type="number" id="edit-budget" class="form-control" style="width:100%; padding:0.5rem; background:var(--bg-dark); border:1px solid #333; color:white; border-radius:4px;">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">📝 Notes & Description</label>
                    <textarea id="edit-desc" class="form-control" rows="3" style="width:100%; padding:0.5rem; background:var(--bg-dark); border:1px solid #333; color:white; border-radius:4px;"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="btn-close-edit" class="btn" style="background: #333; color:white; border:none; padding:0.6rem 1rem; border-radius:4px; cursor:pointer;">Annuler</button>
                    <button type="submit" class="btn" style="background: var(--color-torii); color:white; border:none; padding:0.6rem 1rem; border-radius:4px; cursor:pointer;">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CHARGEMENT GOOGLE MAPS -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtCPxmMm2O7dRTpSw2ZxrhfzggQv7LBU0&libraries=places&v=weekly" defer></script>

    <!-- LOGIQUE JS COMPLETE -->
    <script>
        let map;

        function initMap(destinationName) {
            const mapElement = document.getElementById('map');
            if (!mapElement || typeof google === 'undefined') return;

            const geocoder = new google.maps.Geocoder();

            geocoder.geocode({ address: destinationName || "Tokyo, Japon" }, (results, status) => {
                let location = { lat: 35.6762, lng: 139.6503 };

                if (status === 'OK' && results[0]) {
                    location = results[0].geometry.location;
                }

                map = new google.maps.Map(mapElement, {
                    zoom: 11,
                    center: location,
                    disableDefaultUI: true,
                    zoomControl: true,
                    styles: [
                        { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                        { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                        { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                        { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                        { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                        { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
                        { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
                    ],
                });

                new google.maps.Marker({
                    position: location,
                    map: map,
                    title: destinationName,
                    animation: google.maps.Animation.DROP
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            let activeTrip = JSON.parse(localStorage.getItem('kaido_active_trip')) || JSON.parse(localStorage.getItem('currentTrip'));
            const allTrips = JSON.parse(localStorage.getItem('kaido_trips')) || [];

            if (!activeTrip) {
                alert("Aucun voyage sélectionné. Retour au tableau de bord.");
                window.location.href = "index.html";
                return;
            }

            // --- TÂCHES PAR DÉFAUT SI LA LISTE EST VIDE ---
            if (!activeTrip.checklist) {
                activeTrip.checklist = [
                    { id: 1, text: "Passeport / Carte d'identité", done: false },
                    { id: 2, text: "Billets de transport & Réservations", done: false },
                    { id: 3, text: "Adaptateur prise électrique", done: false },
                    { id: 4, text: "Trousse de pharmacie", done: false }
                ];
            }

            // --- FONCTION DE SAUVEGARDE GLOBALE ---
            function saveActiveTrip() {
                const tripIndex = allTrips.findIndex(t => t.id === activeTrip.id);
                if (tripIndex !== -1) {
                    allTrips[tripIndex] = activeTrip;
                    localStorage.setItem('kaido_trips', JSON.stringify(allTrips));
                }
                localStorage.setItem('kaido_active_trip', JSON.stringify(activeTrip));
            }

            // --- RENDU DE LA CHECKLIST ---
            function renderChecklist() {
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';

                activeTrip.checklist.forEach(item => {
                    const li = document.createElement('li');
                    li.className = `checklist-item ${item.done ? 'completed' : ''}`;
                    
                    li.innerHTML = `
                        <label>
                            <input type="checkbox" data-id="${item.id}" ${item.done ? 'checked' : ''}>
                            <span>${item.text}</span>
                        </label>
                        <button class="btn-delete-task" data-id="${item.id}">✖</button>
                    `;

                    const checkbox = li.querySelector('input[type="checkbox"]');
                    checkbox.addEventListener('change', (e) => {
                        item.done = e.target.checked;
                        saveActiveTrip();
                        renderChecklist();
                    });

                    const deleteBtn = li.querySelector('.btn-delete-task');
                    deleteBtn.addEventListener('click', () => {
                        activeTrip.checklist = activeTrip.checklist.filter(t => t.id !== item.id);
                        saveActiveTrip();
                        renderChecklist();
                    });

                    container.appendChild(li);
                });
            }

            const addTaskForm = document.getElementById('add-task-form');
            const taskInput = document.getElementById('new-task-input');

            addTaskForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = taskInput.value.trim();
                if (text) {
                    activeTrip.checklist.push({
                        id: Date.now(),
                        text: text,
                        done: false
                    });
                    saveActiveTrip();
                    renderChecklist();
                    taskInput.value = '';
                }
            });

            // --- RENDU GÉNÉRAL DE LA PAGE ---
            function renderPage() {
                const destination = activeTrip.title || activeTrip.destination || "Destination";

                document.getElementById('trip-main-title').textContent = destination;
                document.getElementById('trip-main-dates').textContent = `📅 ${activeTrip.dates}`;
                document.getElementById('trip-main-desc').textContent = activeTrip.desc || "Aucune note ajoutée pour ce voyage.";
                document.getElementById('trip-budget').textContent = `${activeTrip.budget || 0} €`;

                if (activeTrip.image) {
                    document.getElementById('trip-cover').style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('${activeTrip.image}')`;
                }

                const departure = activeTrip.departure ? activeTrip.departure.split(',')[0].trim() : 'Paris';
                const flightBtn = document.getElementById('btn-google-flights');
                if (destination) {
                    flightBtn.href = `https://www.google.com/travel/flights?q=Flights%20to%20${encodeURIComponent(destination)}%20from%20${encodeURIComponent(departure)}`;
                }

                // --- RENDU DESIGN & STRUCTURÉ DES JOURS (ITINÉRAIRE) ---
                const daysContainer = document.getElementById('itinerary-days-container');
                daysContainer.innerHTML = ''; 
                
                if (activeTrip.itinerary && activeTrip.itinerary.length > 0) {
                    activeTrip.itinerary.forEach(day => {
                        const dayBlock = document.createElement('div');
                        dayBlock.className = 'day-block-card';
                        
                        dayBlock.style.cssText = `
                            background-color: #14110E;
                            border: 1px solid rgba(212, 175, 55, 0.15);
                            border-radius: 10px;
                            padding: 1.5rem;
                            margin-bottom: 2rem;
                            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
                        `;
                        
                        let stepsHTML = '';
                        day.steps.forEach((step, index) => {
                            const isLast = index === day.steps.length - 1;
                            stepsHTML += `
                                <div style="display: flex; gap: 1.2rem; position: relative; padding-bottom: ${isLast ? '0' : '1.5rem'};">
                                    ${!isLast ? `<div style="position: absolute; left: 28px; top: 30px; bottom: 0; width: 2px; background: rgba(212, 175, 55, 0.2);"></div>` : ''}

                                    <div style="
                                        background: rgba(212, 175, 55, 0.1); 
                                        border: 1px solid #D4AF37; 
                                        color: #D4AF37; 
                                        font-weight: 700; 
                                        font-size: 0.85rem; 
                                        padding: 0.4rem 0.6rem; 
                                        border-radius: 6px; 
                                        height: fit-content; 
                                        min-width: 58px; 
                                        text-align: center;
                                        z-index: 1;">
                                        ${step.time || '--:--'}
                                    </div>

                                    <div style="flex: 1; background: rgba(255, 255, 255, 0.02); padding: 0.8rem 1rem; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.03);">
                                        <h4 style="margin: 0; color: #F4EFEA; font-size: 1rem; font-weight: 600;">${step.activity}</h4>
                                        ${step.location ? `<p style="font-size:0.85rem; color:#8E847A; margin: 0.4rem 0 0 0; display: flex; align-items: center; gap: 5px;">📍 ${step.location}</p>` : ''}
                                    </div>
                                </div>
                            `;
                        });

                        dayBlock.innerHTML = `
                            <div style="
                                display: flex; 
                                justify-content: space-between; 
                                align-items: center; 
                                border-bottom: 1px solid rgba(212, 175, 55, 0.15); 
                                padding-bottom: 1rem; 
                                margin-bottom: 1.5rem;">
                                
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <span style="
                                        background: #A63A2B; 
                                        color: #FFFFFF; 
                                        font-weight: 700; 
                                        font-size: 0.9rem; 
                                        padding: 0.3rem 0.8rem; 
                                        border-radius: 4px; 
                                        text-transform: uppercase; 
                                        letter-spacing: 0.05em;">
                                        ${day.day}
                                    </span>
                                    <h3 style="margin: 0; color: #F4EFEA; font-size: 1.1rem; font-weight: 500;">
                                        ${day.dateText || ''}
                                    </h3>
                                </div>
                            </div>

                            <div class="steps-timeline">
                                ${stepsHTML}
                            </div>
                        `;

                        daysContainer.appendChild(dayBlock);
                    });
                }

                renderChecklist();

                setTimeout(() => {
                    initMap(destination);
                }, 500);
            }

            renderPage();

            // MODALE D'ÉDITION
            const modal = document.getElementById('editModal');
            const btnOpen = document.getElementById('btn-open-edit');
            const btnClose = document.getElementById('btn-close-edit');
            const editForm = document.getElementById('edit-trip-form');

            btnOpen.addEventListener('click', () => {
                document.getElementById('edit-date-start').value = activeTrip.dateStart || '';
                document.getElementById('edit-date-end').value = activeTrip.dateEnd || '';
                document.getElementById('edit-budget').value = activeTrip.budget || 0;
                document.getElementById('edit-desc').value = activeTrip.desc || '';
                modal.style.display = 'flex';
            });

            btnClose.addEventListener('click', () => { modal.style.display = 'none'; });

            editForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const newStart = document.getElementById('edit-date-start').value;
                const newEnd = document.getElementById('edit-date-end').value;
                const newBudget = document.getElementById('edit-budget').value;
                const newDesc = document.getElementById('edit-desc').value;

                const start = new Date(newStart);
                const end = new Date(newEnd);
                const timeDiff = end.getTime() - start.getTime();
                const totalDays = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;

                if (totalDays <= 0) {
                    alert("La date de retour doit être après la date de départ !");
                    return;
                }

                activeTrip.dateStart = newStart;
                activeTrip.dateEnd = newEnd;
                activeTrip.budget = newBudget;
                activeTrip.desc = newDesc;
                
                const formatDate = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
                activeTrip.dates = `${formatDate(start)} au ${formatDate(end)}`;

                if (activeTrip.itinerary) {
                    activeTrip.itinerary.forEach((day, index) => {
                        const currentDate = new Date(start);
                        currentDate.setDate(start.getDate() + index);
                        day.dateText = formatDate(currentDate);
                    });
                }

                saveActiveTrip();
                modal.style.display = 'none';
                renderPage();
            });
        });
    </script>
</body>
</html>
